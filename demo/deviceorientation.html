<!DOCTYPE html>
<html>
  <head>
  <script>
var last_time = 0;
var min_duration = 10000;
var max_duration = 0;

document.addEventListener("DOMContentLoaded", () => {
  window.addEventListener("deviceorientation", event => {
    let new_time = event.timeStamp;
    let duration = new_time - last_time;
    document.getElementById("log1").innerHTML = `${event.alpha} : ${event.beta} : ${event.gamma} -> duration : ${new_time - last_time}`;

    if (min_duration > duration) {
      min_duration = duration;
    }
    if (max_duration < duration) {
      max_duration = duration;
    }

    document.getElementById("max").innerHTML = `max: ${max_duration}`;
    document.getElementById("min").innerHTML = `min: ${min_duration}`;
    
    last_time = new_time;
  });

  var last_motion_time = 0;
  window.addEventListener("devicemotion", event => {
    let new_time = event.timeStamp;
    document.getElementById("log2").innerHTML = `${event.acceleration.x} : ${event.acceleration.y} : ${event.acceleration.z} -> duration : ${new_time - last_motion_time}`;
    last_motion_time = new_time;
  });
});
  </script>
  </head>
  <body>
  <div><span>deviceorientation: </span><span id="log1"></span></div>
  <div id="max"></div>
  <div id="min"></div>
  <div><span>devicemotion: </span><span id="log2"></span></div>
  </body>
</html>
