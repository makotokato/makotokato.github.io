<!DOCTYPE html>
<html>
  <head>
  <meta name="viewport" content="width=device-width">  
  <script>
var last_orientation_time = 0;
var min_orientation_duration = 10000;
var max_orientation_duration = 0;
var zero_orientation_duration_count = 0;

var last_motion_time = 0;
var min_motion_duration = 10000;
var max_motion_duration = 0;
var zero_motion_duration_count = 0;

function device_orientation_handler(event) {
    let new_time = event.timeStamp;
    let duration = new_time - last_orientation_time;
    document.getElementById("log1").innerHTML = `${event.alpha} : ${event.beta} : ${event.gamma}<br>duration : ${duration}`;

    if (duration == 0) {
      zero_orientation_duration_count++;
    } else {
      min_orientation_duration = Math.min(min_orientation_duration, duration);
    }
    max_orientation_duration = Math.max(max_orientation_duration, duration);

    document.getElementById("max1").innerHTML = `max: ${max_orientation_duration}`;
    document.getElementById("min1").innerHTML = `min: ${min_orientation_duration} zero count=${zero_orientation_duration_count}`;
    
    last_orientation_time = new_time;
}

function device_orientation_absolute_handler(event) {
    let duration = 0;
    document.getElementById("log2").innerHTML = `${event.alpha} : ${event.beta} : ${event.gamma}<br>duration : ${duration}`;
}
    
function enable_device_orientation(aEnable) {
  if (aEnable) {
    window.addEventListener("deviceorientation", device_orientation_handler);
  } else {
    window.removeEventListener("deviceorientation", device_orientation_handler);
  }
}

function enable_device_orientation_absolute(aEnable) {
  if (aEnable) {
    window.addEventListener("deviceorientationabsolute", device_orientation_absolute_handler);
  } else {
    window.removeEventListener("deviceorientationabsolute", device_orientation_absolute_handler);
  }
}
    
document.addEventListener("DOMContentLoaded", () => {

  window.addEventListener("devicemotion", event => {
    let new_time = event.timeStamp;
    let duration = new_time - last_motion_time;
    document.getElementById("log3").innerHTML = `${event.acceleration.x} : ${event.acceleration.y} : ${event.acceleration.z}<br>duration : ${duration}`;

    if (duration == 0) {
      zero_motion_duration_count++;
    } else {
      min_motion_duration = Math.min(min_motion_duration, duration);
    }
    max_motion_duration = Math.max(max_motion_duration, duration);

    document.getElementById("max3").innerHTML = `max: ${max_motion_duration}`;
    document.getElementById("min3").innerHTML = `min: ${min_motion_duration} zero count=${zero_motion_duration_count}`;
        
    last_motion_time = new_time;
  });
});
  </script>
  </head>
  <body>
  <button onclick="enable_device_orientation(true)">enable deviceorientation</button>
  <button onclick="enable_device_orientation(false)">disable deviceorientation</button>
  <button onclick="enable_device_orientation_absolute(true)">enable deviceorientationabsolute</button>
  <button onclick="enable_device_orientation_absolute(false)">disable deviceorientationabsolute</button>
  
  <div><span>deviceorientation: </span><span id="log1"></span></div>
  <div id="max1"></div>
  <div id="min1"></div>
  <div><span>deviceorientationabsolute: </span><span id="log2"></span></div>
  <div id="max2"></div>
  <div id="min2"></div>
  <div><span>devicemotion: </span><span id="log3"></span></div>
  <div id="max3"></div>
  <div id="min3"></div>
  </body>
</html>
